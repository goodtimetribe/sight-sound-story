sound:
  - A snare hit echoing down an alley
  - Sirens fading into early morning traffic
  - Laughter spilling from an upstairs window
  - A bassline rattling loose car doors
  - The hiss of a spray can on brick
  - Subway brakes screaming on steel rails
  - A preacher shouting through a crackling speaker
  - Dice clacking on a stoop at midnight
  - Record static before the beat drops
  - Helicopter blades chopping the night sky
  - A vendor calling out hot food specials
  - Rain tapping rhythms on a tin awning
  - A voicemail replayed one too many times
  - Sneakers squeaking on a gym floor
  - An old soul sample drifting from a corner shop
  - Distant fireworks over weekend rooftops
  - Bottles clinking in a crowded kitchen
  - A train announcement swallowed by feedback
  - A heartbeat louder than the crowd
  - Church bells cutting through city noise
